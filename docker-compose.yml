services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biomassiq
      POSTGRES_PASSWORD: biomassiq
      POSTGRES_DB: biomassiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      BIOMASSIQ_DATABASE_URL: postgresql://biomassiq:biomassiq@db:5432/biomassiq
      BIOMASSIQ_CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
